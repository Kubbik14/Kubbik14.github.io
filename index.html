<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro lepší den 💖</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#a18cd1);
background-size:400% 400%;
animation:bg 12s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* CARD */
.box{
text-align:center;
padding:50px;
border-radius:25px;
background:rgba(255,255,255,0.2);
backdrop-filter:blur(12px);
box-shadow:0 20px 40px rgba(0,0,0,0.2);
color:white;
max-width:600px;
}

h1{
font-size:48px;
margin-bottom:20px;
}

p{
font-size:20px;
min-height:70px;
line-height:1.5;
}

/* BUTTON */
button{
margin-top:25px;
padding:14px 30px;
border:none;
border-radius:50px;
background:white;
color:#ff4f81;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.08);
}

/* HEARTS */
.heart{
position:absolute;
bottom:-50px;
font-size:24px;
animation:floatUp linear forwards;
pointer-events:none;
}

@keyframes floatUp{
from{
transform:translateY(0) scale(0.5);
opacity:1;
}
to{
transform:translateY(-120vh) scale(1.5);
opacity:0;
}
}
</style>
</head>

<body>

<div class="box">
<h1>🌸 Ahoj!</h1>

<p id="text">
Doufám, že se dnes aspoň jednou usměješ 😊
</p>

<button onclick="nextMessage()">Klikni pro překvapení❤️</button>
</div>

function nextMessage(){
const text = document.getElementById("text");
text.innerText = messages[Math.floor(Math.random()*messages.length)];

for(let i=0;i<20;i++){
createHeart();
}
}

function createHeart(){
const heart = document.createElement("div");
heart.className = "heart";

const icons = [ 
  "❤️",
  "💖",
  "💕",
  "💗",
  "💘",
  "💝",
  "🥰",
  "😍",
  "😘",
  "🌹"
];
heart.innerText = icons[Math.floor(Math.random()*icons.length)];

heart.style.left = Math.random()*100 + "vw";
heart.style.fontSize = (18 + Math.random()*25) + "px";
heart.style.animationDuration = (3 + Math.random()*3) + "s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(), 7000);
}

/* ambient hearts */
setInterval(createHeart, 600);
</script>

</body>
</html>
