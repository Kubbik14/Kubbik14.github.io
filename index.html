<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apple Emotion Engine ✨</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 3D LAYER -->
<div id="three-container"></div>

<!-- AUDIO -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/10/30/audio_c3f2b6f0c7.mp3?filename=soft-piano-ambient-121931.mp3" type="audio/mp3">
</audio>

<!-- CURSOR -->
<div id="cursor"></div>

<!-- LOADER -->
<div id="loader">
    <div class="logo">✨</div>
    <div class="loadbar"></div>
</div>

<!-- APP -->
<div id="app">

    <!-- SCREEN 1 -->
    <section class="screen active" id="home">
        <div class="glass">
            <h1>🌸 Welcome</h1>
            <p>Interactive emotional experience</p>
            <button onclick="start()">Start</button>
        </div>
    </section>

    <!-- SCREEN 2 -->
    <section class="screen" id="main">
        <canvas id="bg"></canvas>
        <canvas id="fx"></canvas>

        <div class="glass center">
            <h2 id="text">Loading emotion...</h2>
            <button onclick="pulse()">Tap</button>
            <div id="stats">0</div>
        </div>
    </section>

    <!-- SCREEN 3 -->
    <section class="screen" id="final">
        <div class="glass">
            <h1>💖 Complete</h1>
            <p>You created energy</p>
        </div>
    </section>

</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="app.js"></script>

</body>
</html>
